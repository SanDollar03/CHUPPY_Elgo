<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHUPPY ELGO</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="hero-banner">
        <div class="hero-left-inline">
            <img src="{{ url_for('static', filename='kinkotsuman.png') }}" alt="icon" class="hero-character-inline"
                onerror="this.style.display='none';">
            <div class="hero-title-main">🩻 CHUPPY ELGO</div>
        </div>
    </header>

    <div class="container">
        {% if not model_exists %}
        <div class="alert error">
            models/pose_landmarker_full.task が見つかりません。
        </div>
        {% endif %}

        <section id="uploadSection" class="card">
            <h2>動画アップロード</h2>

            <div id="dropZone" class="drop-zone">
                <p>ここに動画をドラッグ＆ドロップ</p>
                <p>または</p>
                <label class="file-select">
                    ファイルを選択
                    <input type="file" id="fileInput" accept="video/*" hidden>
                </label>
            </div>

            <div id="selectedFile" class="selected-file">未選択</div>

            <button id="analyzeBtn" class="primary-btn" disabled>エルゴ解析</button>
        </section>

        <section id="progressSection" class="card">
            <h2>進捗</h2>
            <div class="progress-wrap">
                <div id="progressBar" class="progress-bar">0%</div>
            </div>
            <div id="progressMessage" class="progress-message">待機中</div>
        </section>

        <section id="resultSection" class="card hidden">
            <div class="result-layout">
                <div class="video-panel">
                    <h2>解析動画</h2>
                    <video id="resultVideo" class="result-video" controls autoplay muted playsinline></video>

                    <div class="download-panel vertical compact-links">
                        <a id="downloadVideo" class="download-link compact" href="#" download>⬇️解析動画ダウンロード</a>
                        <a id="downloadSummaryText" class="download-link compact" href="#"
                            download>⬇️解析サマリー(TXT)ダウンロード</a>
                        <a id="downloadSummaryJson" class="download-link compact" href="#"
                            download>⬇️解析サマリー(JSON)ダウンロード</a>
                        <a id="downloadVtt" class="download-link compact" href="#" download>⬇️字幕(VTT)ダウンロード</a>
                    </div>
                </div>

                <div class="analysis-panel">
                    <h2>解析結果</h2>
                    <div id="summaryStats" class="summary-stats"></div>
                    <div class="graph-section">
                        <div class="graph-title">分析グラフ</div>
                        <div id="graphsWrap" class="graphs-wrap"></div>
                    </div>
                    <div id="reportCards" class="report-cards compact"></div>
                </div>
            </div>
    </div>
    </section>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
